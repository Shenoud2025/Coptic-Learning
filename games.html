<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>لعبة البالونات</title>

<style>

@font-face {
    font-family: 'CSAvaVeni';
    src: url('./CSAvaVeni-Regular-3.ttf') format('truetype');
}

body {
    font-family: 'CSAvaVeni', sans-serif;
    background: #f4fbff;
    margin: 0;
    padding: 20px;
    color: #333;

}

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

background:linear-gradient(#87CEEB,#E0F7FF);

overflow:hidden;

font-family:Arial;

height:100vh;

}

.header{

display:flex;

justify-content:space-between;

padding:20px;

font-size:24px;

font-weight:bold;

}

#target{

text-align:center;

font-size:45px;

margin-top:10px;

}

#game{

position:relative;

width:100%;

height:80vh;

overflow:hidden;

}

.balloon{

position:absolute;

width:90px;

height:110px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-family:CSAvaVeni;

font-size:55px;

color:white;

cursor:pointer;

user-select:none;

box-shadow:0 8px 20px rgba(0,0,0,.3);

animation:float 12s linear infinite;

}

.balloon::after{

content:"";

position:absolute;

bottom:-25px;

width:2px;

height:30px;

background:#555;

}

@keyframes float{

0%{

transform:translateY(120vh);

}

100%{

transform:translateY(-150px);

}

}

</style>

</head>

<body>

<div class="header">

<div>

⭐ <span id="score">0</span>

</div>

<div>

🎈 لعبة البالونات

</div>

</div>

<h2 id="target">

ابحث عن الحرف

</h2>

<div id="game"></div>
<script>

const letters=[
"Ⲁ","Ⲃ","Ⲅ","Ⲇ","Ⲉ","Ⲋ","Ⲍ","Ⲏ"
];

let score=0;

let targetLetter="";

const game=document.getElementById("game");

function randomLetter(){

targetLetter=letters[Math.floor(Math.random()*letters.length)];

document.getElementById("target").innerHTML=
"🔊 اضغط على الحرف : <span style='font-family:CSAvaVeni;font-size:60px'>"+targetLetter+"</span>";

}

function createBalloon(){

let balloon=document.createElement("div");

balloon.className="balloon";

let letter=letters[Math.floor(Math.random()*letters.length)];

if(Math.random()<0.3){

letter=targetLetter;

}

balloon.innerHTML=letter;

balloon.style.left=Math.random()*85+"%";

const colors=[

"#ff4d6d",

"#00b894",

"#0984e3",

"#fdcb6e",

"#9b59b6",

"#e17055"

];

balloon.style.background=
colors[Math.floor(Math.random()*colors.length)];

balloon.onclick=function(){

if(letter===targetLetter){

score+=10;

document.getElementById("score").innerHTML=score;

balloon.remove();

randomLetter();

}else{

score=Math.max(0,score-5);

document.getElementById("score").innerHTML=score;

alert("❌ حاول مرة أخرى");

}

};

game.appendChild(balloon);

setTimeout(()=>{

balloon.remove();

},12000);

}

randomLetter();

setInterval(createBalloon,1200);

</script>

</body>
</html>
